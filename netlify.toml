[build]
  # This tells Netlify your index.html is in the main folder
  publish = "."
  # This tells Netlify not to run any build scripts
  command = ""

[functions]
  [functions."*"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.youtube.com; connect-src 'self';"

[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat"
  status = 200
  force = false
